<!doctype html>
<html lang="kh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>បញ្ចូលទិន្នន័យ Facebook</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  
  <style>
    :root {
      --primary: #0a66c2; --primary-hover: #004182; --bg-color: #f3f4f6;
      --card-bg: #ffffff; --text-main: #1f2937; --text-secondary: #4b5563;
      --border-color: #d1d5db; --input-bg: #f9fafb; --focus-ring: rgba(10, 102, 194, 0.2);
      --success-bg: #dcfce7; --radius-lg: 16px; --radius-md: 10px;
    }
    body { font-family: 'Kantumruy Pro', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .container { background: var(--card-bg); width: 100%; max-width: 850px; padding: 40px; border-radius: var(--radius-lg); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    .header-section { text-align: center; margin-bottom: 35px; }
    .header-section h2 { color: var(--primary); font-weight: 700; font-size: 28px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .header-section p { color: var(--text-secondary); font-size: 14px; margin-top: 8px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; position: relative; }
    label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); display: flex; align-items: center; }
    label i { margin-right: 8px; color: var(--primary); font-size: 14px;}
    .input-icon-wrap { position: relative; }
    .input-icon-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 16px; pointer-events: none; transition: color 0.3s; }
    input, textarea, select { width: 100%; padding: 14px 14px 14px 45px; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; font-size: 15px; transition: all 0.3s; box-sizing: border-box; background-color: var(--input-bg); color: var(--text-main); appearance: none; -webkit-appearance: none; -moz-appearance: none; }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px var(--focus-ring); background-color: #ffffff; }
    .input-icon-wrap:focus-within i { color: var(--primary); }
    textarea { min-height: 110px; resize: vertical; padding-top: 16px; }
    .input-icon-wrap textarea + i { top: 24px; }
    /* Select specific styles to add arrow */
    .select-wrap::after { content: '\f0d7'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
    .toggle-row { display: inline-flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--text-secondary); cursor: pointer; user-select: none; width: max-content; }
    .toggle-row:hover { color: var(--primary); }
    .toggle-row input { width: 16px; height: 16px; cursor: pointer; padding: 0; margin: 0; accent-color: var(--primary);}
    .optional-hint { color: #f59e0b; font-size: 12px; margin-top: 6px; font-weight: 500;}
    button[type="submit"] { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; font-weight: 600; padding: 16px; border: none; border-radius: var(--radius-md); cursor: pointer; font-size: 16px; transition: all 0.3s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; box-shadow: 0 4px 14px rgba(10, 102, 194, 0.3); }
    button[type="submit"]:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(10, 102, 194, 0.4); }
    button[type="submit"]:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .ts-control { padding: 14px 14px 14px 16px !important; border-radius: var(--radius-md) !important; border-color: var(--border-color) !important; background-color: var(--input-bg) !important; font-size: 15px !important; border-width: 1px !important; box-shadow: none !important; }
    .ts-control.focus { border-color: var(--primary) !important; box-shadow: 0 0 0 4px var(--focus-ring) !important; background-color: #ffffff !important; }
    @media (max-width: 768px) { .container { padding: 25px 20px; } .grid { grid-template-columns: 1fr; gap: 20px;} }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-section">
      <h2><i class="fab fa-facebook" style="font-size: 32px;"></i> បំពេញទិន្នន័យ Create Facebook</h2>
      <p>សូមបញ្ចូលព័ត៌មានខាងក្រោម។ បញ្ចូល Link Account វានឹងទាញយក UID ដោយស្វ័យប្រវត្តិ!</p>
    </div>
    
    <form id="fbForm">
      <div class="grid">
        <div class="form-group">
          <label><i class="fas fa-user-circle"></i> ឈ្មោះ (Name)</label>
          <select id="nameSelect" name="name" placeholder="ស្វែងរក ឬ ជ្រើសរើសឈ្មោះ...">
            <option value="">កំពុងទាញឈ្មោះ...</option>
          </select>
        </div>

        <div class="form-group">
          <label><i class="fas fa-address-card"></i> អ៊ីមែល ឬ លេខទូរស័ព្ទ (Email / Phone)</label>
          <div class="input-icon-wrap">
            <input id="emailPhone" name="email" type="text" placeholder="ឧទាហរណ៍៖ example@email.com / 096xxxxxx" />
            <i class="fas fa-envelope"></i>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-lock"></i> ពាក្យសម្ងាត់អ៊ីមែល (Pass Email)</label>
          <div class="input-icon-wrap">
            <input id="passwordEmail" name="passwordEmail" type="password" placeholder="បញ្ចូលពាក្យសម្ងាត់ Email" />
            <i class="fas fa-key"></i>
          </div>
          <div class="optional-hint"><i class="fas fa-info-circle"></i> មិនចាំបាច់ ប្រសិនបើប្រើលេខទូរស័ព្ទ</div>
          <label class="toggle-row"><input type="checkbox" data-toggle="passwordEmail" /> <i class="fas fa-eye"></i> បង្ហាញពាក្យសម្ងាត់</label>
        </div>

        <div class="form-group">
          <label><i class="fas fa-unlock-alt"></i> ពាក្យសម្ងាត់ Account (Pass FB)</label>
          <div class="input-icon-wrap">
            <input id="passwordAccount" name="passwordAccount" type="password" placeholder="បញ្ចូលពាក្យសម្ងាត់ Facebook" />
            <i class="fas fa-asterisk"></i>
          </div>
          <label class="toggle-row"><input type="checkbox" data-toggle="passwordAccount" /> <i class="fas fa-eye"></i> បង្ហាញពាក្យសម្ងាត់</label>
        </div>

        <div class="form-group full">
          <label><i class="fas fa-link"></i> Link Account</label>
          <div class="input-icon-wrap">
            <input id="linkAccountInput" name="linkAccount" placeholder="ឧទាហរណ៍៖ https://facebook.com/share/... ឬ profile.php?id=..." />
            <i class="fas fa-globe"></i>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-id-badge"></i> UID</label>
          <div class="input-icon-wrap">
             <input id="uidInput" name="uid" placeholder="UID នឹងបង្ហាញនៅទីនេះ..." />
             <i class="fas fa-fingerprint"></i>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-shield-alt"></i> 2FA Key</label>
          <div class="input-icon-wrap">
            <input name="twoFA" placeholder="បញ្ចូលកូដ 2FA..." />
            <i class="fas fa-qrcode"></i>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fas fa-calendar-alt"></i> កាលបរិច្ឆេទបង្កើត (Date Create)</label>
          <div class="input-icon-wrap">
            <input name="dateCreate" type="date" />
            <i class="fas fa-calendar-day"></i>
          </div>
        </div>

        <div class="form-group full">
          <label><i class="fas fa-comment-dots"></i> Reason (មូលហេតុ)</label>
          <div class="input-icon-wrap select-wrap">
            <select name="reason">
              <option value="" disabled selected>ជ្រើសរើសមូលហេតុ...</option>
              <option value="Done">Done</option>
              <option value="No">No</option>
            </select>
            <i class="fas fa-tasks"></i>
          </div>
        </div>

        <div class="full">
          <button id="btnSubmit" type="submit"><i class="fas fa-cloud-upload-alt"></i> <span id="btnText">បញ្ជូនទិន្នន័យ (Submit Data)</span></button>
        </div>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    // ⚠️ ជំនួស URL Web App ថ្មីរបស់អ្នកនៅទីនេះ
    const APPS_SCRIPT_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzgzRpV7QoQlYYWKw86Wx1EGq5BIGe4QuovC8x_KHdnWd1pZv8pXWKyjcl2NDhlYYxfLw/exec"; 
    let tomSelectInstance;

    // --- ១. ទាញឈ្មោះទាំងអស់ពីជួរឈរ A ---
    async function fetchNames() {
      return new Promise((resolve, reject) => {
        const cbName = "cb_names_" + Math.random().toString(36).slice(2);
        window[cbName] = (res) => {
          delete window[cbName];
          document.getElementById(cbName)?.remove();
          if (res && res.names) resolve(res.names); else reject("No names found.");
        };
        const script = document.createElement("script");
        script.id = cbName;
        script.src = `${APPS_SCRIPT_WEBAPP_URL}?action=names&callback=${cbName}`;
        script.onerror = () => reject("Failed");
        document.body.appendChild(script);
      });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      tomSelectInstance = new TomSelect("#nameSelect", {
        create: false, placeholder: "ស្វែងរក ឬ ជ្រើសរើសឈ្មោះ...",
        render: {
          option: (data, escape) => `<div class="p-2"><i class="fas fa-user-circle text-muted" style="margin-right:8px; color:#6b7280;"></i> ${escape(data.text)}</div>`,
          item: (data, escape) => `<div>${escape(data.text)}</div>`
        }
      });
      
      try {
        const names = await fetchNames();
        tomSelectInstance.clearOptions();
        names.forEach(name => tomSelectInstance.addOption({ value: name, text: name }));
      } catch (err) {
        tomSelectInstance.clearOptions();
        tomSelectInstance.settings.placeholder = "មិនមានឈ្មោះក្នុង Database ទេ";
        tomSelectInstance.updatePlaceholder();
      }
    });

    // --- ២. បិទ/បើក មើលពាក្យសម្ងាត់ ---
    document.querySelectorAll('[data-toggle]').forEach(cb => {
      cb.addEventListener("change", (e) => {
        document.getElementById(e.target.dataset.toggle).type = e.target.checked ? "text" : "password";
      });
    });

    // --- ៣. Auto Extract UID ---
    const linkAccountInput = document.getElementById("linkAccountInput");
    const uidInput = document.getElementById("uidInput");

    function applyUidSuccess(uid) {
      uidInput.value = uid;
      uidInput.style.backgroundColor = "var(--success-bg)"; uidInput.style.borderColor = "#22c55e";
      setTimeout(() => { uidInput.style.backgroundColor = "var(--input-bg)"; uidInput.style.borderColor = "var(--border-color)"; }, 1500);
      Swal.fire({ toast: true, position: "top-end", icon: "success", title: "ទាញយក UID ជោគជ័យ!", showConfirmButton: false, timer: 2500 });
    }

    linkAccountInput.addEventListener("input", function() {
      const rawUrl = this.value.trim();
      if (!rawUrl) { uidInput.value = ""; return; }

      let directUid = "";
      if (/^\d+$/.test(rawUrl)) {
        directUid = rawUrl;
      } else {
        const idQueryMatch = rawUrl.match(/[?&]id=(\d+)/i);
        const profilePathMatch = rawUrl.match(/facebook\.com\/(?:profile\.php\/?)?(\d{6,})/i);
        const fbMeMatch = rawUrl.match(/fb\.me\/(?:profile\.php\/?)?(\d{6,})/i); 
        
        if (idQueryMatch) directUid = idQueryMatch[1];
        else if (profilePathMatch) directUid = profilePathMatch[1];
        else if (fbMeMatch) directUid = fbMeMatch[1];
      }

      if (directUid) {
        if (uidInput.value !== directUid) applyUidSuccess(directUid);
        return;
      }

      if (rawUrl.includes("share") || rawUrl.includes("fb.me") || rawUrl.includes("facebook.com")) {
        uidInput.value = "កំពុងស្វែងរក UID...";
        
        const cbName = "cb_uid_" + Math.random().toString(36).slice(2);
        window[cbName] = (res) => {
          delete window[cbName];
          document.getElementById(cbName)?.remove();
          
          if (res && res.uid) {
            applyUidSuccess(res.uid);
          } else {
            uidInput.value = ""; 
            Swal.fire({ toast: true, position: "top-end", icon: "error", title: "មិនអាចទាញយក UID បានទេ!", showConfirmButton: false, timer: 2500 });
          }
        };

        const script = document.createElement("script");
        script.id = cbName;
        script.src = `${APPS_SCRIPT_WEBAPP_URL}?action=getUid&url=${encodeURIComponent(rawUrl)}&callback=${cbName}`;
        document.body.appendChild(script);
      }
    });

    // --- ៤. បញ្ជូនទិន្នន័យ (Submit Form) ---
    const form = document.getElementById("fbForm");
    const btn = document.getElementById("btnSubmit");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const data = Object.fromEntries(fd.entries());
      
      const valEmailPhone = data.email.trim();
      const isPhoneNumber = /^\d+$/.test(valEmailPhone) && valEmailPhone.length >= 8;
      let requiredFields = ['name', 'email', 'uid', 'passwordAccount', 'twoFA', 'linkAccount', 'dateCreate'];
      if (!isPhoneNumber) requiredFields.push('passwordEmail');

      if (requiredFields.some(key => !data[key]) && !data.reason) {
        Swal.fire({ icon: 'warning', title: 'ព័ត៌មានមិនគ្រប់គ្រាន់!', text: 'សូមបំពេញចន្លោះដែលខ្វះ ឬជ្រើសរើសមូលហេតុបញ្ជាក់។', confirmButtonColor: '#f59e0b' });
        return;
      }

      btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> កំពុងបញ្ជូន...';
      
      try {
        await fetch(APPS_SCRIPT_WEBAPP_URL, {
          method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data)
        });
        Swal.fire({ icon: 'success', title: 'ជោគជ័យ!', text: 'ទិន្នន័យត្រូវបានរក្សាទុកក្នុងកូឡោនត្រឹមត្រូវ។', confirmButtonColor: '#0a66c2', timer: 2000, showConfirmButton: false });
        form.reset(); if(tomSelectInstance) tomSelectInstance.clear();
      } catch (error) {
        Swal.fire({ icon: 'error', title: 'បរាជ័យ!', text: 'មានបញ្ហាបច្ចេកទេស។' });
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> បញ្ជូនទិន្នន័យ (Submit Data)';
      }
    });
  </script>
</body>
</html>
